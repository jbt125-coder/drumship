<!DOCTYPE html>

<html>
<head>
<title>Sci-Fi Otoma-Shooter: Deep Bass</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;}
body{margin:0;background:#050510;overflow:hidden;font-family:'Share Tech Mono','Courier New',monospace;touch-action:none;color:white;}
canvas{display:block;}

/* ── HUD ── */
#hud{position:absolute;top:0;left:0;right:0;display:none;justify-content:space-between;align-items:flex-start;padding:12px 18px;pointer-events:none;z-index:5;}
.hud-block{display:flex;flex-direction:column;gap:3px;}
.hud-label{font-size:.55rem;color:rgba(0,255,255,.5);letter-spacing:3px;text-transform:uppercase;}
.hud-value{font-family:‘Orbitron’,monospace;font-size:1.3rem;color:#0ff;text-shadow:0 0 10px #0ff;letter-spacing:2px;}
#lives-display{display:flex;gap:5px;align-items:center;margin-top:2px;}
.life-icon{width:13px;height:13px;clip-path:polygon(50% 0%,100% 100%,50% 75%,0% 100%);background:#0ff;box-shadow:0 0 6px #0ff;transition:all .3s;}
.life-icon.lost{background:#111;box-shadow:none;}
#powerup-display{font-size:.7rem;color:#ff0;text-shadow:0 0 8px #ff0;letter-spacing:1px;min-height:16px;}
#wave-display{text-align:center;}

/* ── MINI RADAR (tappable in-game) ── */
#mini-radar-btn{position:absolute;top:14px;right:14px;width:108px;height:108px;z-index:15;display:none;cursor:pointer;pointer-events:auto;}
#mini-radar-btn canvas{border-radius:50%;border:1px solid rgba(0,255,255,.25);}
#mini-radar-hint{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:.38rem;color:rgba(0,255,255,.45);letter-spacing:1px;white-space:nowrap;}

/* ── GAME CONTROLS ── */
#game-ui{position:absolute;bottom:18px;left:0;right:0;display:none;justify-content:space-between;align-items:flex-end;padding:0 18px;pointer-events:none;z-index:10;}
.control{border-radius:50%;pointer-events:auto;position:relative;touch-action:none;}
#dpad{width:118px;height:118px;background:rgba(0,255,255,.05);border:2px solid rgba(0,255,255,.35);}
#dpad-stick{width:38px;height:38px;background:rgba(0,255,255,.7);border-radius:50%;position:absolute;top:40px;left:40px;box-shadow:0 0 10px #0ff;}
#fire-buttons{display:flex;gap:12px;align-items:flex-end;pointer-events:auto;}
.fire-btn{border-radius:50%;border:2px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:bold;font-size:.7rem;letter-spacing:1px;cursor:pointer;user-select:none;transition:all .1s;pointer-events:auto;touch-action:none;}
#fire-a{width:98px;height:98px;background:rgba(255,0,120,.1);border-color:#f09;color:#f09;box-shadow:0 0 10px rgba(255,0,120,.3);}
#fire-b{width:82px;height:82px;background:rgba(255,160,0,.1);border-color:#fa0;color:#fa0;box-shadow:0 0 10px rgba(255,160,0,.3);}
#fire-c{width:70px;height:70px;background:rgba(0,255,180,.07);border-color:#0fb;color:#0fb;box-shadow:0 0 10px rgba(0,255,180,.3);}
#fire-c.shielding{background:rgba(0,255,180,.25);box-shadow:0 0 28px rgba(0,255,180,.8);animation:cowbellPulse .18s infinite alternate;}
@keyframes cowbellPulse{from{transform:scale(1);}to{transform:scale(1.08);}}
.fire-btn.pressed{transform:scale(.92);filter:brightness(1.6);}
.fire-label{font-size:1rem;margin-bottom:1px;}

/* ── HEALTH BAR ── */
#health-bar-wrap{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:180px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;z-index:6;display:none;}
#health-bar-fill{height:100%;width:100%;background:linear-gradient(to right,#0f8,#0ff);border-radius:3px;transition:width .1s;box-shadow:0 0 8px #0ff;}

/* ── DOUBLE SHIP SHIELD ── */
#companion-shield{display:none;position:absolute;top:50%;left:50%;width:60px;height:60px;border:2px solid #f44;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:4;box-shadow:0 0 14px #f44,inset 0 0 10px rgba(255,60,60,.3);animation:compShieldPulse .4s infinite alternate;}
@keyframes compShieldPulse{from{opacity:.7;}to{opacity:1;}}

/* ── LOOP SCREEN (shared by start + in-game tap) ── */
#loop-screen{position:absolute;top:0;left:0;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:16px 0 12px;background:rgba(0,0,12,.96);z-index:20;overflow-y:auto;}
#loop-screen.hidden{display:none;}
#loop-title{font-family:‘Orbitron’,monospace;font-weight:900;font-size:1.2rem;color:#0ff;text-shadow:0 0 18px #0ff;text-align:center;margin:0 0 2px;letter-spacing:.2em;}
#loop-title span{color:#f0f;}
.sub{color:rgba(0,255,255,.38);font-size:.58rem;letter-spacing:3px;text-align:center;margin-bottom:10px;text-transform:uppercase;}

/* Tab bar */
#loop-tabs{display:flex;gap:0;border:1px solid rgba(0,255,255,.2);border-radius:20px;overflow:hidden;margin-bottom:10px;}
.loop-tab{padding:5px 18px;border:none;background:transparent;font-family:‘Orbitron’,monospace;font-size:.46rem;font-weight:700;letter-spacing:.1em;color:rgba(0,255,255,.4);cursor:pointer;transition:all .15s;}
.loop-tab.active{background:#0ff;color:#000;}

/* Beat library */
.beat-lib-title{font-family:‘Orbitron’,monospace;font-size:.5rem;letter-spacing:.2em;color:#0ff;text-transform:uppercase;text-shadow:0 0 8px rgba(0,255,255,.4);margin-bottom:6px;align-self:flex-start;padding-left:4px;}
#beat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;width:100%;max-width:460px;padding:0 10px;margin-bottom:10px;}
.beat-btn{padding:6px 2px;border-radius:5px;border:1px solid rgba(0,255,255,.2);background:rgba(0,255,255,.03);color:rgba(0,255,255,.4);font-family:‘Orbitron’,monospace;font-size:.36rem;font-weight:700;letter-spacing:.04em;text-align:center;transition:all .13s;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.3;}
.beat-btn .bn{font-size:.68rem;font-weight:900;color:rgba(0,255,255,.55);}
.beat-btn .bname{font-size:.32rem;color:rgba(0,255,255,.3);letter-spacing:.03em;}
.beat-btn:active,.beat-btn.active{border-color:#0ff;color:#0ff;background:rgba(0,255,255,.09);box-shadow:0 0 10px rgba(0,255,255,.28);}
.beat-btn.active .bn{color:#0ff;}
.beat-btn.active .bname{color:rgba(0,255,255,.58);}
.beat-btn.previewing{border-color:#fa0;box-shadow:0 0 8px rgba(255,160,0,.5);animation:previewPulse .5s infinite alternate;}
@keyframes previewPulse{from{box-shadow:0 0 4px rgba(255,160,0,.4);}to{box-shadow:0 0 14px rgba(255,160,0,.8);}}

/* Builder tab */
#builder-panel{width:100%;max-width:460px;padding:0 10px;display:none;flex-direction:column;align-items:center;gap:6px;}
#builder-panel.active{display:flex;}
.drum-sidebar-h{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:4px;}
.drum-chip-h{padding:5px 8px;border-radius:4px;border:1px solid rgba(0,255,255,.2);background:rgba(0,255,255,.04);font-size:.42rem;letter-spacing:.05em;cursor:grab;display:flex;align-items:center;gap:4px;touch-action:none;transition:border-color .12s;color:#cce8ff;}
.drum-chip-h .chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.drum-chip-h.dragging{opacity:.4;}
#builder-hint{font-size:.42rem;color:rgba(0,255,255,.35);letter-spacing:1px;text-align:center;}
#builder-radar-wrap{position:relative;width:200px;height:200px;flex-shrink:0;}
#builder-clear{font-family:‘Orbitron’,monospace;font-size:.44rem;border:1px solid rgba(255,56,96,.5);color:rgba(255,56,96,.7);background:transparent;padding:4px 12px;border-radius:4px;cursor:pointer;letter-spacing:.08em;transition:all .15s;}
#builder-clear:active{background:rgba(255,56,96,.2);}

/* BPM row */
#seq-bpm-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bpm-adj-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid #0ff;background:transparent;color:#0ff;font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;font-family:inherit;line-height:1;}
.bpm-adj-btn:active{background:#0ff;color:#000;}
#seq-bpm-val{font-family:‘Orbitron’,monospace;font-size:1.2rem;font-weight:900;color:#fa0;text-shadow:0 0 10px rgba(255,160,0,.6);min-width:65px;text-align:center;letter-spacing:.05em;}
#seq-bpm-lbl{font-size:.4rem;color:rgba(0,255,255,.38);letter-spacing:2px;}

/* Preview radar */
#radar-preview-wrap{position:relative;width:180px;height:180px;flex-shrink:0;margin-bottom:6px;}

/* Launch / Resume buttons */
#start-btn,#resume-btn{font-family:‘Orbitron’,monospace;font-weight:900;border:2px solid #f0f;color:#f0f;background:transparent;font-size:.95rem;padding:11px 36px;letter-spacing:3px;box-shadow:0 0 18px rgba(255,0,255,.35);cursor:pointer;transition:all .2s;margin-bottom:14px;}
#start-btn:hover,#start-btn:active,#resume-btn:hover,#resume-btn:active{background:#f0f;color:#000;box-shadow:0 0 40px #f0f;}
#resume-btn{border-color:#0ff;color:#0ff;box-shadow:0 0 18px rgba(0,255,255,.35);}
#resume-btn:hover,#resume-btn:active{background:#0ff;color:#000;}

/* ── DAMAGE FLASH ── */
#damage-flash{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,0,0,0);pointer-events:none;z-index:19;transition:background .05s;}

/* ── GAME OVER ── */
#gameover-ui{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;flex-direction:column;align-items:center;gap:14px;background:rgba(0,0,0,.88);border:1px solid #f0f;padding:34px 50px;z-index:30;text-align:center;box-shadow:0 0 40px rgba(255,0,255,.3);}
#gameover-ui h2{font-family:‘Orbitron’,monospace;color:#f0f;font-size:1.7rem;margin:0;text-shadow:0 0 20px #f0f;}
#final-score{color:#0ff;font-size:1.05rem;}
#restart-btn{font-family:‘Orbitron’,monospace;border:1.5px solid #0ff;color:#0ff;background:transparent;padding:10px 26px;font-size:.85rem;cursor:pointer;letter-spacing:2px;transition:all .2s;}
#restart-btn:hover{background:#0ff;color:#000;}

/* ── GUITAR STRIP ── */
#guitar-strip{position:absolute;left:0;top:50%;transform:translateY(-50%);width:52px;height:220px;display:none;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px;z-index:12;pointer-events:auto;padding-bottom:6px;cursor:pointer;touch-action:manipulation;}
#guitar-bar-wrap{width:18px;height:170px;background:rgba(0,0,0,.5);border:1px solid rgba(255,100,0,.3);border-radius:9px;overflow:hidden;position:relative;}
#guitar-bar-fill{position:absolute;bottom:0;left:0;width:100%;background:linear-gradient(to top,#f60,#ff0,#fff);border-radius:9px;transition:height .1s;}
#guitar-bar-ready{position:absolute;bottom:0;left:0;width:100%;height:0;background:rgba(255,200,0,.2);border-radius:9px;animation:guitarPulse 1s infinite alternate;}
@keyframes guitarPulse{from{box-shadow:0 0 4px #f60 inset;}to{box-shadow:0 0 18px #ff0 inset;}}
#guitar-icon{font-size:1.4rem;filter:drop-shadow(0 0 6px #f80);user-select:none;touch-action:manipulation;pointer-events:none;}
#guitar-icon.ready{animation:iconBounce .4s infinite alternate;}
@keyframes iconBounce{from{transform:scale(1);}to{transform:scale(1.25) rotate(-10deg);}}
#guitar-icon.firing{animation:none;filter:drop-shadow(0 0 18px #fff);}

/* ── SCRATCH STRIP ── */
#scratch-strip{
position:absolute;right:0;top:50%;transform:translateY(-50%);
width:52px;height:260px;display:none;flex-direction:column;
align-items:center;justify-content:center;gap:6px;
z-index:12;pointer-events:auto;touch-action:none;
}
#scratch-track{
width:22px;height:200px;
background:rgba(0,0,0,.55);
border:1px solid rgba(180,0,255,.35);
border-radius:11px;position:relative;overflow:hidden;cursor:ns-resize;
}
/* groove lines */
#scratch-track::before{
content:’’;position:absolute;left:0;right:0;top:0;bottom:0;
background:repeating-linear-gradient(to bottom,transparent 0px,transparent 7px,rgba(180,0,255,.12) 7px,rgba(180,0,255,.12) 8px);
}
#scratch-needle{
position:absolute;left:50%;transform:translateX(-50%);
width:18px;height:28px;border-radius:6px;
background:linear-gradient(to bottom,#c0f,#80f);
box-shadow:0 0 10px rgba(180,0,255,.8);
top:50%;margin-top:-14px;
transition:box-shadow .05s;pointer-events:none;
}
#scratch-needle.active{box-shadow:0 0 22px rgba(255,100,255,1),0 0 6px #fff;}
#scratch-icon{font-size:1.1rem;filter:drop-shadow(0 0 5px #c0f);pointer-events:none;user-select:none;}
#scratch-label{font-size:.32rem;color:rgba(180,0,255,.5);letter-spacing:.12em;pointer-events:none;}
#boss-bar-wrap{position:absolute;bottom:160px;left:50%;transform:translateX(-50%);width:min(360px,80vw);display:none;flex-direction:column;align-items:center;gap:3px;z-index:8;pointer-events:none;}
#boss-bar-label{font-family:‘Orbitron’,monospace;font-size:.5rem;color:#f0f;letter-spacing:.2em;text-shadow:0 0 8px #f0f;}
#boss-bar-outer{width:100%;height:10px;background:rgba(0,0,0,.6);border:1px solid rgba(255,0,255,.4);border-radius:5px;overflow:hidden;}
#boss-bar-inner{height:100%;background:linear-gradient(to right,#f0f,#f09);border-radius:5px;transition:width .2s;}

/* drag ghost */
#drag-ghost{position:fixed;pointer-events:none;z-index:9999;padding:4px 7px;border-radius:4px;font-size:.44rem;border:1px solid white;background:rgba(0,0,20,.9);color:white;opacity:0;transform:translate(-50%,-50%);font-family:‘Share Tech Mono’,monospace;}
</style>

</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="damage-flash"></div>
<div id="health-bar-wrap"><div id="health-bar-fill"></div></div>
<div id="companion-shield"></div>

<!-- HUD -->

<div id="hud">
  <div class="hud-block">
    <span class="hud-label">Score</span>
    <span class="hud-value" id="score-val">0</span>
  </div>
  <div class="hud-block" id="wave-display" style="align-items:center">
    <span class="hud-label">Wave</span>
    <span class="hud-value" id="wave-val">1</span>
    <span id="powerup-display"></span>
  </div>
  <div class="hud-block" style="align-items:flex-end">
    <span class="hud-label">Lives</span>
    <div id="lives-display"></div>
  </div>
</div>

<!-- Mini Radar Button (tappable in-game) -->

<div id="mini-radar-btn">
  <canvas id="mini-radar-canvas" width="108" height="108"></canvas>
  <div id="mini-radar-hint">TAP TO CHANGE BEAT</div>
</div>

<!-- Game Controls -->

<div id="game-ui">
  <div id="dpad" class="control"><div id="dpad-stick"></div></div>
  <div id="fire-buttons">
    <div id="fire-c" class="fire-btn control"><span class="fire-label">🔔</span><span id="cowbell-count">5</span></div>
    <div id="fire-b" class="fire-btn control"><span class="fire-label">⚡</span><span>BASS</span></div>
    <div id="fire-a" class="fire-btn control"><span class="fire-label">🔫</span><span>LASER</span></div>
  </div>
</div>

<!-- Loop Screen (start + in-game) -->

<div id="loop-screen">
  <div id="loop-title">RADAR BEAT <span>SEQUENCER</span></div>
  <p class="sub">Choose a beat · or build your own</p>

  <div id="loop-tabs">
    <button class="loop-tab active" id="tab-library" onclick="switchTab('library')">LIBRARY</button>
    <button class="loop-tab" id="tab-builder" onclick="switchTab('builder')">BUILD</button>
  </div>

  <!-- LIBRARY TAB -->

  <div id="library-panel" style="width:100%;max-width:460px;padding:0 10px;display:flex;flex-direction:column;align-items:center;">
    <div class="beat-lib-title" style="align-self:flex-start;">⬡ BEAT LIBRARY</div>
    <div id="beat-grid"></div>
    <div id="seq-bpm-row">
      <button class="bpm-adj-btn" id="bpmMinus">−</button>
      <div style="text-align:center"><div id="seq-bpm-val">120</div><div id="seq-bpm-lbl">BPM</div></div>
      <button class="bpm-adj-btn" id="bpmPlus">+</button>
    </div>
    <div id="radar-preview-wrap"><canvas id="radar-preview" width="180" height="180"></canvas></div>
  </div>

  <!-- BUILDER TAB -->

  <div id="builder-panel">
    <div id="seq-bpm-row-b" style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
      <button class="bpm-adj-btn" id="bpmMinusB">−</button>
      <div style="text-align:center"><div id="seq-bpm-val-b" style="font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;color:#fa0;text-shadow:0 0 10px rgba(255,160,0,.6);min-width:65px;text-align:center;">120</div><div style="font-size:.4rem;color:rgba(0,255,255,.38);letter-spacing:2px;">BPM</div></div>
      <button class="bpm-adj-btn" id="bpmPlusB">+</button>
    </div>
    <div class="drum-sidebar-h" id="drum-chips-h"></div>
    <div id="builder-hint">DRAG DRUMS ONTO RADAR · TAP CIRCLE TO REMOVE</div>
    <div id="builder-radar-wrap">
      <canvas id="builder-radar-canvas" width="200" height="200"></canvas>
    </div>
    <button id="builder-clear" onclick="clearBuilder()">CLEAR ALL</button>
  </div>

<button id="start-btn">▶ LAUNCH SHIP</button>
<button id="resume-btn" style="display:none;">▶ RESUME</button>

</div>

<!-- Game Over -->

<div id="gameover-ui">
  <h2>SHIP DESTROYED</h2>
  <div id="final-score"></div>
  <button id="restart-btn" onclick="restartGame()">▶ TRY AGAIN</button>
</div>

<!-- Guitar Strip -->

<div id="guitar-strip">
  <div id="guitar-icon">🎸</div>
  <div id="guitar-bar-wrap">
    <div id="guitar-bar-fill" style="height:0%"></div>
  </div>
</div>

<!-- Scratch Strip -->

<div id="scratch-strip">
  <div id="scratch-icon">🎧</div>
  <div id="scratch-track">
    <div id="scratch-needle"></div>
  </div>
  <div id="scratch-label">SCRATCH</div>
</div>

<!-- Boss Bar -->

<div id="boss-bar-wrap">
  <div id="boss-bar-label">⚠ DREADNOUGHT</div>
  <div id="boss-bar-outer"><div id="boss-bar-inner" style="width:100%"></div></div>
</div>

<div id="drag-ghost"></div>

<script>
'use strict';

const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;initStars();});

// ════════════════════════════════════════════
//  BEAT LIBRARY
// ════════════════════════════════════════════
const BEAT_LIBRARY=[

    {id:'clap',angle:0,r:.62},{id:'clap',angle:180,r:.62},

  {name:'TRAP',bpm:140,circles:[
    {id:'kick',angle:270,r:.80},{id:'kick',angle:337,r:.68},{id:'kick',angle:22,r:.65},

    {id:'hat',angle:270,r:.52},{id:'hat',angle:292,r:.46},{id:'hat',angle:315,r:.52},
    {id:'hat',angle:337,r:.46},{id:'hat',angle:0,r:.52},{id:'hat',angle:22,r:.46},{id:'hat',angle:45,r:.52}]},
  {name:'HALF TIME',bpm:80,circles:[
    {id:'kick',angle:270,r:.78},{id:'kick',angle:45,r:.65},{id:'snare',angle:90,r:.76},

    {id:'hat',angle:90,r:.52},{id:'hat',angle:135,r:.52},{id:'hat',angle:180,r:.52},{id:'hat',angle:225,r:.52},
    {id:'crash',angle:270,r:.88}]},
  {name:'REGGAETON',bpm:96,circles:[
    {id:'kick',angle:270,r:.75},{id:'kick',angle:337,r:.68},{id:'kick',angle:67,r:.68},
    {id:'snare',angle:0,r:.70},{id:'snare',angle:180,r:.70},
    {id:'perc',angle:315,r:.58},{id:'perc',angle:45,r:.58},{id:'perc',angle:135,r:.58},{id:'perc',angle:225,r:.58}]},
  {name:'JUNGLE',bpm:170,circles:[
    {id:'kick',angle:270,r:.78},{id:'kick',angle:22,r:.68},{id:'kick',angle:112,r:.72},
    {id:'snare',angle:0,r:.80},{id:'snare',angle:180,r:.80},{id:'snare',angle:337,r:.62},

const AudioCtx=window.AudioContext||window.webkitAudioContext;

function initAudio(){
  if(isAudioInit)return;

  isAudioInit=true;

function startOtomatone(){
  if(otoOsc||!audioCtx)return;
  otoOsc=audioCtx.createOscillator();otoGain=audioCtx.createGain();
  const dist=audioCtx.createWaveShaper();dist.curve=makeDistCurve(50);dist.oversample='4x';
  otoOsc.type='sine';otoOsc.connect(dist);dist.connect(otoGain);otoGain.connect(masterGain);
  otoGain.gain.value=0;otoOsc.start();
}
function makeDistCurve(k){
  const n=44100,c=new Float32Array(n),deg=Math.PI/180;
  for(let i=0;i<n;i++){const x=i*2/n-1;c[i]=(3+k)*x*20*deg/(Math.PI+k*Math.abs(x));}return c;
}

// Beat preview: play first 2 beats worth of circles then stop
let previewTimeout=null;
function previewBeat(circles,bpm){
  if(!audioCtx)return;
  stopPreview();
  const barMs=(60000/bpm)*4; // one full revolution = 4 beats
  const now=audioCtx.currentTime;
  // Schedule 2 bars worth of hits
  for(let bar=0;bar<2;bar++){
    circles.forEach(c=>{
      const offsetMs=(c.angle/360)*barMs + bar*barMs;
      const t=now+offsetMs/1000;
      const g=audioCtx.createGain();g.connect(masterGain);
      // Tiny volume for preview
      g.gain.setValueAtTime(.55,t);g.gain.setValueAtTime(.55,t);
      playDrumAt(c.id,t);
    });
  }
  previewTimeout=setTimeout(stopPreview,(barMs*2)+200);
}

function playSingleCowbell(pitchBase){
  if(!audioCtx)return;

  const t1=audioCtx.createOscillator(),t2=audioCtx.createOscillator();
  const bp1=audioCtx.createBiquadFilter(),bp2=audioCtx.createBiquadFilter();

  bp1.type='bandpass';bp1.frequency.value=pitchBase;bp1.Q.value=4.5;
  bp2.type='bandpass';bp2.frequency.value=pitchBase*1.505;bp2.Q.value=4.5;
  mix.gain.value=1;
  g.gain.setValueAtTime(.7,t);
  g.gain.exponentialRampToValueAtTime(.15,t+.04);
  g.gain.exponentialRampToValueAtTime(.001,t+.6);
  t1.connect(bp1);bp1.connect(mix);
  t2.connect(bp2);bp2.connect(mix);
  mix.connect(g);g.connect(masterGain);
  t1.start(t);t1.stop(t+.65);t2.start(t);t2.stop(t+.65);
  t1.onended=()=>g.disconnect();
}

function doFireC(){
  if(gameState!=='PLAYING'||fireCdC>0)return;
  fireCdC=18; // short cooldown so you can tap 5 times quickly
  const pitch=COWBELL_PITCHES[cowbellPitchIdx%COWBELL_PITCHES.length];
  cowbellPitchIdx++;
  playSingleCowbell(pitch);
  cowbellHitCount++;
  const remaining=5-cowbellHitCount;
  document.getElementById('cowbell-count').textContent=remaining>0?remaining:'★';
  fireC.classList.add('pressed');setTimeout(()=>fireC.classList.remove('pressed'),80);
  // Every 5 hits: activate shield with inward gravity pull
  if(cowbellHitCount>=5){
    cowbellHitCount=0;
    document.getElementById('cowbell-count').textContent='5';
    cowbellShieldTimer=COWBELL_SHIELD_DURATION;
    cowbellShieldGravity=true;
    fireC.classList.add('shielding');
    setTimeout(()=>{fireC.classList.remove('shielding');cowbellShieldGravity=false;}, COWBELL_SHIELD_DURATION*16.67);
    // Play a shield-on chord
    [480,600,720].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g2=audioCtx.createGain();
      o.type='square';o.frequency.value=f;
      const bp=audioCtx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=f;bp.Q.value=3;
      g2.gain.setValueAtTime(.5,audioCtx.currentTime+i*.04);

      o.onended=()=>g2.disconnect();

}

// Thick, distorted, sustaining power chord
// Rotating power chord roots (E A D G B E across two octaves — feels like changing position on a guitar neck)
const GUITAR_ROOTS=[41.2,55,61.7,73.4,82.4,98,110,123.5,130.8,146.8,164.8,196];
let guitarChordIdx=0;

function playGuitarStrike(gainLevel){
  if(!audioCtx)return;
  const t=audioCtx.currentTime;
  // Pick current chord root and advance for next fire
  const root=GUITAR_ROOTS[guitarChordIdx%GUITAR_ROOTS.length];
  guitarChordIdx++;
  const fifth=root*1.498; // perfect 5th
  const oct=root*2;
  const masterDistGain=audioCtx.createGain();masterDistGain.connect(masterGain);
  masterDistGain.gain.setValueAtTime(gainLevel,t);
  masterDistGain.gain.setTargetAtTime(0,t+.4,1.2); // slow sustain decay

  [root,fifth,oct,root*2].forEach((freq,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sawtooth';o.frequency.value=freq+(Math.random()-.5)*1.5;
    const dist=audioCtx.createWaveShaper();dist.curve=makeGuitarCurve();dist.oversample='4x';
    const o2=audioCtx.createOscillator();o2.type='sawtooth';o2.frequency.value=freq*1.008;
    g.gain.setValueAtTime(.4-i*.04,t);
    o.connect(dist);o2.connect(dist);dist.connect(g);g.connect(masterDistGain);
    o.start(t);o.stop(t+6);o2.start(t);o2.stop(t+6);
    o.onended=()=>{g.disconnect();try{masterDistGain.disconnect();}catch(e){}};
  });
  // Scrape attack noise
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.05,audioCtx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const ns=audioCtx.createBufferSource();ns.buffer=buf;
  const nf=audioCtx.createBiquadFilter();nf.type='bandpass';nf.frequency.value=2000;nf.Q.value=1;
  const ng=audioCtx.createGain();ng.gain.setValueAtTime(.5,t);ng.gain.exponentialRampToValueAtTime(.001,t+.05);
  ns.connect(nf);nf.connect(ng);ng.connect(masterGain);ns.start(t);ns.onended=()=>ng.disconnect();
}
function makeGuitarCurve(){
  const n=1024,curve=new Float32Array(n),k=280;
  for(let i=0;i<n;i++){
    const x=i*2/n-1;
    curve[i]=(Math.PI+k)*x/(Math.PI+k*Math.abs(x));
    curve[i]=Math.max(-0.85,Math.min(0.85,curve[i]));
  }
  return curve;
}

// ── SCRATCH — scrubs the rendered beat loop forward/backward ──
let scratchBuf=null;
let scratchGainNode=null,scratchFilterNode=null;
let scratchActive=false,scratchY=0,scratchLastY=0,scratchVel=0;
let scratchNeedleY=0.5;
let scratchPlayhead=0;
let scratchScriptNode=null;

function renderBeatBuffer(){
  if(!audioCtx||!activeBeatCircles.length)return;
  const barSecs=(60/radarBpm)*4;
  const totalSecs=barSecs*2;
  const sr=audioCtx.sampleRate;
  const offCtx=new OfflineAudioContext(1,Math.ceil(totalSecs*sr),sr);
  const offGain=offCtx.createGain();offGain.gain.value=0.9;offGain.connect(offCtx.destination);
  for(let bar=0;bar<2;bar++){
    activeBeatCircles.forEach(c=>{
      const hitTime=(c.angle/360)*barSecs+bar*barSecs;
      schedDrumOffline(offCtx,offGain,c.id,hitTime);
    });
  }
  offCtx.startRendering().then(rendered=>{
    const fwd=rendered.getChannelData(0);
    const rev=new Float32Array(fwd.length);
    for(let i=0;i<fwd.length;i++)rev[i]=fwd[fwd.length-1-i];
    const out=audioCtx.createBuffer(2,fwd.length,sr);
    out.copyToChannel(fwd,0);out.copyToChannel(rev,1);
    scratchBuf=out;
    scratchPlayhead=out.length/2;
  }).catch(()=>{});
}

function schedDrumOffline(oc,dest,id,t){
  const g=oc.createGain();g.connect(dest);
  if(id==='kick'){
    const o=oc.createOscillator();o.type='sine';
    o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(28,t+.09);
    g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);
    o.connect(g);o.start(t);o.stop(t+.2);
  } else if(id==='snare'){
    const buf=oc.createBuffer(1,oc.sampleRate*.15,oc.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const s=oc.createBufferSource();s.buffer=buf;
    const f=oc.createBiquadFilter();f.type='bandpass';f.frequency.value=900;
    g.gain.setValueAtTime(.8,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);
    s.connect(f);f.connect(g);s.start(t);
  } else if(id==='hat'){
    const buf=oc.createBuffer(1,oc.sampleRate*.04,oc.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const s=oc.createBufferSource();s.buffer=buf;
    const f=oc.createBiquadFilter();f.type='highpass';f.frequency.value=6000;
    g.gain.setValueAtTime(.32,t);g.gain.exponentialRampToValueAtTime(.001,t+.05);
    s.connect(f);f.connect(g);s.start(t);
  } else {
    const o=oc.createOscillator();o.type='triangle';
    o.frequency.setValueAtTime(id==='clap'?900:id==='rim'?650:id==='tom'?180:450,t);
    o.frequency.exponentialRampToValueAtTime(60,t+.1);
    g.gain.setValueAtTime(.55,t);g.gain.exponentialRampToValueAtTime(.001,t+.14);
    o.connect(g);o.start(t);o.stop(t+.15);
  }
}

function startScratchAudio(){
  if(!audioCtx)return;
  // Set up gain + filter chain
  if(!scratchGainNode){
    scratchGainNode=audioCtx.createGain();scratchGainNode.gain.value=0;
    scratchFilterNode=audioCtx.createBiquadFilter();
    scratchFilterNode.type='peaking';scratchFilterNode.frequency.value=1400;
    scratchFilterNode.gain.value=16;scratchFilterNode.Q.value=1.6;
    const air=audioCtx.createBiquadFilter();air.type='highshelf';air.frequency.value=3500;air.gain.value=7;
    const dist=audioCtx.createWaveShaper();
    const curve=new Float32Array(512);
    for(let i=0;i<512;i++){const x=i*2/512-1;curve[i]=Math.max(-0.75,Math.min(0.75,x*4));}
    dist.curve=curve;
    scratchGainNode.connect(scratchFilterNode);scratchFilterNode.connect(air);
    air.connect(dist);dist.connect(masterGain);
  }
  // Render the beat buffer (async, ready next touch)
  renderBeatBuffer();
}

function startScratchPlayback(){
  if(scratchScriptNode||!scratchBuf||!audioCtx)return;
  const bufSize=512;
  scratchScriptNode=audioCtx.createScriptProcessor(bufSize,0,1);
  scratchScriptNode._spd=0;
  scratchScriptNode.onaudioprocess=(e)=>{
    const out=e.outputBuffer.getChannelData(0);
    const spd=scratchScriptNode._spd;
    const src=spd>=0?scratchBuf.getChannelData(0):scratchBuf.getChannelData(1);
    const absSp=Math.abs(spd);
    for(let i=0;i<bufSize;i++){
      const idx=Math.floor(scratchPlayhead);
      if(idx>=0&&idx<src.length-1){
        const fr=scratchPlayhead-idx;
        out[i]=src[idx]*(1-fr)+src[Math.min(idx+1,src.length-1)]*fr;
      } else out[i]=0;
      scratchPlayhead+=absSp;
      if(scratchPlayhead>=scratchBuf.length)scratchPlayhead=0;
      if(scratchPlayhead<0)scratchPlayhead=scratchBuf.length-1;
    }
  };
  scratchScriptNode.connect(scratchGainNode);
}

function stopScratchPlayback(){
  if(scratchScriptNode){try{scratchScriptNode.disconnect();}catch(e){}scratchScriptNode=null;}
}

function updateScratchAudio(vel){
  if(!audioCtx||!scratchGainNode)return;
  const t=audioCtx.currentTime;
  const vol=Math.min(1.0,Math.abs(vel)*.06);
  const spd=(vel/25)*1.8; // samples/output-sample speed
  if(scratchScriptNode)scratchScriptNode._spd=spd;
  scratchGainNode.gain.setTargetAtTime(vol,t,.01);
  if(scratchFilterNode)scratchFilterNode.frequency.setTargetAtTime(
    Math.max(500,Math.min(3000,1300+vel*20)),t,.014);
}

function stopScratchAudio(){
  if(!scratchGainNode)return;
  scratchGainNode.gain.setTargetAtTime(0,audioCtx.currentTime,.06);
}

const COMPANION_DURATION=7200; // 2 min @ 60fps
const COMPANION_SHIELD_DURATION=1800; // 30 sec
let particles=[],bullets=[],asteroids=[],powerupItems=[];
let aliens=[];
let alienBullets=[];
let alienSpawnTimer=0;
let dpadActive=false,inputX=0,inputY=0;
const ship={x:canvas.width/2,y:canvas.height/2,vx:0,vy:0,speed:6};

// Guitar: 10 shots, recharge one shot every 6 seconds
const GUITAR_MAX_SHOTS=10;
const GUITAR_SHOT_RECHARGE_MS=6000;
let guitarShots=10;
let guitarRechargeMs=0;
let guitarReady=false;
let guitarFiring=false;
let guitarVolume=0;
let guitarLastFireTime=0;
const GUITAR_SUSTAIN=5000;

// Boss state
let boss=null;
let bossSpawned=false;

function resetGame(){
  lives=MAX_LIVES;score=0;wave=1;powerup=null;powerupTimer=0;invincibleTimer=0;
  bullets.length=0;asteroids.length=0;powerupItems.length=0;particles.length=0;
  aliens.length=0;alienBullets.length=0;alienSpawnTimer=0;
  ship.x=canvas.width/2;ship.y=canvas.height/2;ship.vx=0;ship.vy=0;
  radarTriggered={};
  guitarShots=GUITAR_MAX_SHOTS;guitarRechargeMs=0;guitarReady=true;guitarFiring=false;guitarVolume=0;
  boss=null;bossSpawned=false;
  scratchGravity={x:0,y:0};scratchStrength=0;scratchVel=0;
  cowbellShieldTimer=0;fireCdC=0;cowbellHitCount=0;cowbellShieldGravity=false;
  laserPitchIdx=0;bassPitchIdx=0;cowbellPitchIdx=0;
  document.getElementById('cowbell-count').textContent='5';
  companion=null;health=1.0;healthRegenCooldown=0;
  document.getElementById('companion-shield').style.display='none';
  updateHealthBar();
  updateGuitarStrip();
  updateHUD();
}
function updateHUD(){
  document.getElementById('score-val').textContent=score;
  document.getElementById('wave-val').textContent=wave;
  const ld=document.getElementById('lives-display');ld.innerHTML='';
  for(let i=0;i<MAX_LIVES;i++){const d=document.createElement('div');d.className='life-icon'+(i>=lives?' lost':'');ld.appendChild(d);}
  const pd=document.getElementById('powerup-display');
  pd.textContent=(powerup&&powerupTimer>0)?({spread:'✦ SPREAD',rapid:'⚡ RAPID',shield:'🛡 SHIELD'}[powerup]||''):'';
}

let alienIdCtr=0;
const ALIEN_COLORS=['#ff3860','#a855f7','#f59e0b','#10b981','#3b82f6'];

function spawnAlien(){
  const side=Math.floor(Math.random()*4);
  let x,y,vx,vy;
  const spd=0.6+Math.random()*0.8+wave*0.08;
  if(side===0){x=Math.random()*canvas.width;y=-30;vx=(Math.random()-.5)*spd;vy=spd*(.6+Math.random()*.4);}
  else if(side===1){x=canvas.width+30;y=Math.random()*canvas.height;vx=-spd;vy=(Math.random()-.5)*spd*.5;}
  else if(side===2){x=Math.random()*canvas.width;y=canvas.height+30;vx=(Math.random()-.5)*spd;vy=-spd*(.6+Math.random()*.4);}
  else{x=-30;y=Math.random()*canvas.height;vx=spd;vy=(Math.random()-.5)*spd*.5;}
  const id=alienIdCtr++;
  const radarAngleDeg=Math.floor(Math.random()*24)*15;
  const radarRadius=0.4+Math.random()*0.45;
  const alienDrums=['kick','snare','hat','clap','perc','rim','tom'];
  const drumId=alienDrums[id%alienDrums.length];
  // 33% chance orb type
  const isOrb=Math.random()<0.33;
  const type=isOrb?'orb':'diamond';
  const color=isOrb?'#f44':'#'+ALIEN_COLORS[id%ALIEN_COLORS.length].slice(1);
  const hp=isOrb?4+Math.floor(wave/2):2+Math.floor(wave/3);
  aliens.push({id,type,x,y,vx,vy,hp,maxHp:hp,rot:0,size:isOrb?18+Math.random()*8:14+Math.random()*8,
    color,shootTimer:60+Math.floor(Math.random()*120),
    soundTimer:30+Math.floor(Math.random()*60),hit:0,wobble:Math.random()*Math.PI*2,
    radarAngleDeg,radarRadius,drumId});
}

function updateAliens(){
  alienSpawnTimer++;
  const spawnInterval=Math.max(120,360-wave*20);
  if(alienSpawnTimer>spawnInterval&&aliens.length<3+Math.floor(wave/2)){spawnAlien();alienSpawnTimer=0;}

  for(let i=aliens.length-1;i>=0;i--){
    const al=aliens[i];
    al.wobble+=.04;
    al.x+=al.vx+Math.sin(al.wobble)*.4;
    al.y+=al.vy+Math.cos(al.wobble*.7)*.3;
    al.rot+=.04;
    if(al.hit>0)al.hit--;

    // Scratch repulsion — same physics as asteroids
    if(scratchStrength>0.05){
      const sdx=al.x-ship.x,sdy=al.y-ship.y;
      const sdist=Math.hypot(sdx,sdy)||1;
      const pushRadius=320;
      if(sdist<pushRadius){
        const force=scratchStrength*2.2*(1-sdist/pushRadius);
        al.vx+=sdx/sdist*force;al.vy+=sdy/sdist*force;
        const spd=Math.hypot(al.vx,al.vy);
        if(spd>4){al.vx=al.vx/spd*4;al.vy=al.vy/spd*4;}
      }
    }
    // Cowbell shield gravity: pull aliens toward ship (gentle)
    if(cowbellShieldGravity&&cowbellShieldTimer>0){
      const sdx=ship.x-al.x,sdy=ship.y-al.y;
      const sdist=Math.hypot(sdx,sdy)||1;
      al.vx+=sdx/sdist*0.06;al.vy+=sdy/sdist*0.06;
      const spd2=Math.hypot(al.vx,al.vy);
      if(spd2>3.5){al.vx=al.vx/spd2*3.5;al.vy=al.vy/spd2*3.5;}
    }

    // Clamp scratch-boosted velocity before off-screen check
    {const spd=Math.hypot(al.vx,al.vy);if(spd>5){al.vx=al.vx/spd*5;al.vy=al.vy/spd*5;}}

    // Remove if off screen — just remove, don't recycle (avoids fast re-entry)
    const margin=80;
    if(al.x<-margin||al.x>canvas.width+margin||al.y<-margin||al.y>canvas.height+margin){
      aliens.splice(i,1);continue;
    }

    // Shoot at player
    al.shootTimer--;
    if(al.shootTimer<=0){
      const dx=ship.x-al.x,dy=ship.y-al.y,dist=Math.hypot(dx,dy)||1;
      const spd=al.type==='orb'?2.8:3.5;
      alienBullets.push({x:al.x,y:al.y,vx:(dx/dist)*spd,vy:(dy/dist)*spd,life:160,color:al.color});
      playAlienShoot();
      al.shootTimer=(al.type==='orb'?120:80)+Math.floor(Math.random()*80);
    }
    ctx.save();ctx.translate(al.x,al.y);ctx.rotate(al.rot);
    const col=al.hit>0?'#fff':al.color;
    ctx.strokeStyle=col;ctx.fillStyle=al.color+'22';ctx.lineWidth=2;
    ctx.shadowBlur=al.hit>0?20:8;ctx.shadowColor=col;
    const s=al.size;
    if(al.type==='orb'){
      // Circle ship — rings + spokes
      ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.arc(0,0,s*.58,0,Math.PI*2);ctx.stroke();
      for(let sp=0;sp<6;sp++){const a2=sp*Math.PI/3;ctx.beginPath();ctx.moveTo(Math.cos(a2)*s*.25,Math.sin(a2)*s*.25);ctx.lineTo(Math.cos(a2)*s*.88,Math.sin(a2)*s*.88);ctx.stroke();}
      ctx.fillStyle=col;ctx.shadowBlur=16;ctx.beginPath();ctx.arc(0,0,s*.2,0,Math.PI*2);ctx.fill();
    } else {
      // Diamond with wings
      ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.6,0);ctx.lineTo(0,s*.6);ctx.lineTo(-s*.6,0);ctx.closePath();ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.moveTo(-s*.6,0);ctx.lineTo(-s*1.3,-s*.3);ctx.lineTo(-s*.8,s*.3);ctx.closePath();ctx.stroke();
      ctx.beginPath();ctx.moveTo(s*.6,0);ctx.lineTo(s*1.3,-s*.3);ctx.lineTo(s*.8,s*.3);ctx.closePath();ctx.stroke();
      ctx.fillStyle=col;ctx.shadowBlur=12;ctx.beginPath();ctx.arc(0,0,s*.22,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();ctx.shadowBlur=0;

    // HP bar
    if(al.maxHp>1){
      const bw=al.size*2.5,bh=3,bx=al.x-bw/2,by=al.y-al.size-8;
      ctx.fillStyle='#111';ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle=al.color;ctx.fillRect(bx,by,bw*(al.hp/al.maxHp),bh);
    }

    // Bullet collision with aliens
    for(let b=bullets.length-1;b>=0;b--){
      const bl=bullets[b];
      if(Math.hypot(bl.x-al.x,bl.y-al.y)<al.size+bl.size){
        al.hp--;al.hit=8;bullets.splice(b,1);
        if(al.hp<=0){
          if(al.type==='orb'){playOrbExplosion();if(!companion)spawnCompanion();}
          else playAlienExplosion(al.x,al.y);
          spawnParticles(al.x,al.y,al.color,14);
          spawnPowerup(al.x,al.y);
          score+=(al.type==='orb'?250:100)+wave*10;updateHUD();
          onAlienKilled();
          aliens.splice(i,1);
        }
        break;
      }
    }
  }

  // Alien bullets
  for(let b=alienBullets.length-1;b>=0;b--){
    const bl=alienBullets[b];
    bl.x+=bl.vx;bl.y+=bl.vy;bl.life--;
    if(bl.life<=0||bl.x<0||bl.x>canvas.width||bl.y<0||bl.y>canvas.height){alienBullets.splice(b,1);continue;}
    ctx.fillStyle=bl.color;ctx.shadowBlur=8;ctx.shadowColor=bl.color;
    ctx.beginPath();ctx.arc(bl.x,bl.y,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    // Hit player
    if(invincibleTimer===0&&powerup!=='shield'&&cowbellShieldTimer===0&&Math.hypot(bl.x-ship.x,bl.y-ship.y)<16){
      alienBullets.splice(b,1);takeDamage();continue;
    }
    // Companion shield absorbs hit
    if(companion&&companion.shieldTimer>0&&Math.hypot(bl.x-(ship.x+companion.offsetX),bl.y-ship.y)<22){
      alienBullets.splice(b,1);spawnParticles(bl.x,bl.y,'#f44',3);continue;
    }
  }
}

function updateGuitarStrip(){
  const fill=document.getElementById('guitar-bar-fill');
  const icon=document.getElementById('guitar-icon');
  if(!fill||!icon)return;
  // Show shots as stacked pips — fill height = shots remaining fraction
  const frac=guitarShots/GUITAR_MAX_SHOTS;
  fill.style.height=(frac*100)+'%';
  // Color: full=hot orange-white, low=dim red
  const r=Math.floor(180+75*frac),g2=Math.floor(frac*200);
  fill.style.background=`linear-gradient(to top,rgb(${r},${Math.floor(g2*.4)},0),rgb(${r},${g2},0),${frac>.7?'#fff':'#f80'})`;
  // Draw pip markers on the bar
  const barWrap=document.getElementById('guitar-bar-wrap');
  // Remove old pip markers
  barWrap.querySelectorAll('.guitar-pip').forEach(p=>p.remove());
  for(let i=1;i<GUITAR_MAX_SHOTS;i++){
    const pip=document.createElement('div');
    pip.className='guitar-pip';
    pip.style.cssText=`position:absolute;left:0;right:0;bottom:${i*10}%;height:1px;background:rgba(0,0,0,.4);pointer-events:none;`;
    barWrap.appendChild(pip);
  }
  icon.classList.toggle('ready',guitarShots>0&&!guitarFiring);
  icon.classList.toggle('firing',guitarFiring);
}

function fireGuitar(){
  if(guitarShots<=0||guitarFiring||!audioCtx)return;
  guitarFiring=true;guitarVolume=1.0;guitarLastFireTime=performance.now();
  guitarShots--;
  updateGuitarStrip();
  playGuitarStrike(1.2);
  for(let d=-4;d<=4;d++){
    const a=d*.18,spd=14;
    bullets.push({x:ship.x,y:ship.y-20,vx:Math.sin(a)*spd,vy:-Math.cos(a)*spd,color:'#ff8800',size:6,guitar:true});
  }
  if(!boss)spawnBoss();
  setTimeout(()=>{guitarFiring=false;updateGuitarStrip();},300);
}

// ── Scratch strip touch handling ──
const scratchTrack=document.getElementById('scratch-track');
const scratchNeedle=document.getElementById('scratch-needle');
const SCRATCH_TRACK_H=200; // matches CSS height

let scratchPointerId=null;
let scratchPrevClientY=null;

function scratchGetNeedleY(clientY){
  const rect=scratchTrack.getBoundingClientRect();
  return Math.max(0,Math.min(1,(clientY-rect.top)/rect.height));
}

function updateNeedleVisual(norm){
  // norm 0..1
  const trackH=SCRATCH_TRACK_H;
  const needleH=28;
  const px=(norm*(trackH-needleH));
  scratchNeedle.style.top=px+'px';
  scratchNeedle.style.marginTop='0';
}

scratchTrack.addEventListener('pointerdown',e=>{
  e.preventDefault();e.stopPropagation();
  scratchTrack.setPointerCapture(e.pointerId);
  scratchPointerId=e.pointerId;
  scratchPrevClientY=e.clientY;
  scratchNeedleY=scratchGetNeedleY(e.clientY);
  updateNeedleVisual(scratchNeedleY);
  scratchNeedle.classList.add('active');
  scratchActive=true;
  if(isAudioInit){
    startScratchAudio();       // sets up gain/filter chain + renders beat buf if needed
    startScratchPlayback();    // starts the ScriptProcessor scrubber
  }
},{passive:false});

scratchTrack.addEventListener('pointermove',e=>{
  if(scratchPointerId===null||e.pointerId!==scratchPointerId)return;
  e.preventDefault();
  const norm=scratchGetNeedleY(e.clientY);
  const dy=e.clientY-(scratchPrevClientY||e.clientY);
  scratchPrevClientY=e.clientY;
  scratchNeedleY=norm;
  updateNeedleVisual(norm);
  scratchVel=dy;
  updateScratchAudio(dy);
  const strength=Math.min(1,Math.abs(dy)*.08);
  scratchStrength=strength;
  scratchGravity.x=0;
  scratchGravity.y=dy*.12;
},{passive:false});

['pointerup','pointercancel'].forEach(ev=>{
  scratchTrack.addEventListener(ev,e=>{
    if(e.pointerId!==scratchPointerId)return;
    scratchPointerId=null;scratchPrevClientY=null;scratchActive=false;
    scratchNeedle.classList.remove('active');
    stopScratchAudio();
    stopScratchPlayback();
    scratchGravity.x=0;scratchGravity.y=0;scratchStrength=0;scratchVel=0;
  });
});

function spawnBoss(){
  playBossIntro();
  boss={
    x:canvas.width/2, y:-80,
    targetX:canvas.width/2, targetY:canvas.height*.25,
    vx:0, vy:1.5,
    hp:80+wave*10, maxHp:80+wave*10,
    size:55, rot:0,
    shootTimer:80, phase:0, hit:0,
    color:'#f0f', wobble:0
  };
  document.getElementById('boss-bar-wrap').style.display='flex';
}

function updateBoss(dt){
  if(!boss)return;
  boss.wobble+=.025;
  boss.rot+=.015;
  boss.hit=Math.max(0,boss.hit-1);

  // Move to target then patrol
  const dx=boss.targetX-boss.x, dy=boss.targetY-boss.y;
  const dist=Math.hypot(dx,dy);
  if(dist>4){boss.x+=dx*.018;boss.y+=dy*.018;}
  else{
    // Patrol side to side
    boss.targetX=canvas.width*.1+Math.sin(boss.wobble*.4)*(canvas.width*.8);
    boss.targetY=canvas.height*.15+Math.sin(boss.wobble*.6)*60;
  }

  // Phase-based shooting
  boss.shootTimer--;
  if(boss.shootTimer<=0){
    const ang=Math.atan2(ship.y-boss.y,ship.x-boss.x);
    const spd=4;
    if(boss.phase===0){
      // Aimed burst
      for(let i=-1;i<=1;i++){
        const a=ang+i*.22;
        alienBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:200,color:'#f0f'});
      }
      boss.shootTimer=35;
    } else if(boss.phase===1){
      // Ring spread
      for(let i=0;i<8;i++){const a=i*Math.PI/4;alienBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*spd*.8,vy:Math.sin(a)*spd*.8,life:200,color:'#f09'});}
      boss.shootTimer=80;
    } else {
      // Spiral
      for(let i=0;i<3;i++){const a=boss.rot+i*Math.PI*.66;alienBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*spd*1.2,vy:Math.sin(a)*spd*1.2,life:180,color:'#f0f'});}
      boss.shootTimer=18;
    }
    playAlienShoot();
    boss.phase=boss.hp<boss.maxHp*.33?2:boss.hp<boss.maxHp*.66?1:0;
  }

  // Draw boss
  ctx.save();ctx.translate(boss.x,boss.y);ctx.rotate(boss.rot);
  const col=boss.hit>0?'#fff':boss.color;
  ctx.strokeStyle=col;ctx.fillStyle=boss.color+'18';ctx.lineWidth=2.5;
  ctx.shadowBlur=boss.hit>0?30:14;ctx.shadowColor=col;
  const s=boss.size;
  // Outer hull
  ctx.beginPath();
  for(let i=0;i<8;i++){const a=i*Math.PI/4,r=s*(i%2===0?1:.65);i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
  ctx.closePath();ctx.fill();ctx.stroke();
  // Inner ring
  ctx.beginPath();ctx.arc(0,0,s*.35,0,Math.PI*2);ctx.stroke();
  // Core
  ctx.fillStyle=col;ctx.shadowBlur=20;ctx.beginPath();ctx.arc(0,0,s*.15,0,Math.PI*2);ctx.fill();
  // Engine pods
  [0,Math.PI/2,Math.PI,3*Math.PI/2].forEach(a=>{
    ctx.beginPath();ctx.moveTo(Math.cos(a)*s*.35,Math.sin(a)*s*.35);
    ctx.lineTo(Math.cos(a)*(s+10),Math.sin(a)*(s+10));ctx.stroke();
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(Math.cos(a)*(s*.8),Math.sin(a)*(s*.8),5,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();ctx.shadowBlur=0;

  // Boss HP bar
  document.getElementById('boss-bar-inner').style.width=(boss.hp/boss.maxHp*100)+'%';

  // Bullet collision
  for(let b=bullets.length-1;b>=0;b--){
    const bl=bullets[b];
    if(Math.hypot(bl.x-boss.x,bl.y-boss.y)<boss.size+bl.size){
      const dmg=bl.guitar?12:1;
      boss.hp-=dmg;boss.hit=8;bullets.splice(b,1);
      if(boss.hp<=0){
        playAlienExplosion(boss.x,boss.y);spawnParticles(boss.x,boss.y,'#f0f',30);spawnParticles(boss.x,boss.y,'#ff0',20);
        score+=2000+wave*100;updateHUD();boss=null;
        document.getElementById('boss-bar-wrap').style.display='none';
        playWaveClear();
      }
      break;
    }
  }
  // Player collision
  if(boss&&invincibleTimer===0&&powerup!=='shield'&&Math.hypot(boss.x-ship.x,boss.y-ship.y)<boss.size+14)takeDamage();
}

// ════════════════════════════════════════════
//  AUTO BEAT CHANGE ON ALIEN KILL
// ════════════════════════════════════════════
let alienKillCount=0;
function onAlienKilled(){
  alienKillCount++;
  if(alienKillCount%3===0){
    // Every 3rd alien kill, advance to next beat in library
    const nextIdx=(BEAT_LIBRARY.findIndex(b=>JSON.stringify(b.circles)===JSON.stringify(activeBeatCircles))+1)%BEAT_LIBRARY.length;
    const next=BEAT_LIBRARY[nextIdx]||BEAT_LIBRARY[0];
    activeBeatCircles=[...next.circles];
    radarBpm=next.bpm;
    renderBeatBuffer(); // refresh scratch buffer to new beat
    radarTriggered={};
    // Flash mini radar
    const btn=document.getElementById('mini-radar-btn');
    btn.style.filter='brightness(3)';setTimeout(()=>btn.style.filter='',300);
  }
}
function makeAsteroid(x,y,size,vx,vy){
  const hue=Math.random()<.5?180+Math.random()*40:30+Math.random()*30;
  const verts=6+Math.floor(Math.random()*4);
  const shape=Array.from({length:verts},(_,i)=>{const a=(i/verts)*Math.PI*2,r=(size/2)*(.7+Math.random()*.5);return{x:Math.cos(a)*r,y:Math.sin(a)*r};});
  return{x,y,size,vx,vy,rot:0,rotSpeed:(Math.random()-.5)*.018,color:`hsl(${hue},80%,60%)`,shape};
}
function spawnEdgeAsteroid(){
  const size=22+Math.random()*28,spd=.22+Math.random()*.28;
  const side=Math.floor(Math.random()*4),spread=.35;
  let x,y,vx,vy;
  if(side===0){x=Math.random()*canvas.width;y=-size;const a=Math.PI/2+(Math.random()-.5)*spread;vx=Math.cos(a)*spd;vy=Math.sin(a)*spd;}
  else if(side===1){x=canvas.width+size;y=Math.random()*canvas.height;const a=Math.PI+(Math.random()-.5)*spread;vx=Math.cos(a)*spd;vy=Math.sin(a)*spd;}
  else if(side===2){x=Math.random()*canvas.width;y=canvas.height+size;const a=-Math.PI/2+(Math.random()-.5)*spread;vx=Math.cos(a)*spd;vy=Math.sin(a)*spd;}
  else{x=-size;y=Math.random()*canvas.height;const a=(Math.random()-.5)*spread;vx=Math.cos(a)*spd;vy=Math.sin(a)*spd;}
  return makeAsteroid(x,y,size,vx,vy);
}
function spawnAsteroids(){
  const count=Math.min(4+wave,10);
  for(let i=0;i<count;i++)asteroids.push(spawnEdgeAsteroid());
}
function spawnPowerup(x,y){
  if(Math.random()>.28)return;

  powerupItems.push({x,y,type,color:{spread:'#ff0',rapid:'#0ff',shield:'#0f0'}[type],age:0,vy:-.35-Math.random()*.25});
}

function spawnParticles(x,y,color,count){
  for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,spd=1+Math.random()*4;particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,decay:.02+Math.random()*.03,size:2+Math.random()*3,color});}

function openLoopScreen(){
  stopPreview();
  const ls=document.getElementById('loop-screen');
  ls.classList.remove('hidden');
  const wasPlaying=gameState==='PLAYING';
  if(wasPlaying){
    radarRunning=false;
    document.getElementById('start-btn').style.display='none';
    document.getElementById('resume-btn').style.display='block';
  } else {
    document.getElementById('start-btn').style.display='block';
    document.getElementById('resume-btn').style.display='none';
  }
  previewRaf=requestAnimationFrame(animatePreview);
}
function closeLoopScreen(){
  stopPreview();
  cancelAnimationFrame(previewRaf);previewRaf=null;
  document.getElementById('loop-screen').classList.add('hidden');
}

// D-pad
function handleMove(e){
  if(!dpadActive)return;
  // Ignore if touch is on guitar strip or scratch track
  if(e.touches&&e.touches[0]){
    const tx=e.touches[0].clientX,ty=e.touches[0].clientY;
    const gs=document.getElementById('guitar-strip').getBoundingClientRect();
    const ss=document.getElementById('scratch-track').getBoundingClientRect();
    if((tx>=gs.left&&tx<=gs.right&&ty>=gs.top&&ty<=gs.bottom)||
       (tx>=ss.left&&tx<=ss.right&&ty>=ss.top&&ty<=ss.bottom))return;
  }
  e.preventDefault();
  const touch=e.touches?e.touches[0]:e;
  const rect=dpad.getBoundingClientRect();
  inputX=Math.max(-1,Math.min(1,(touch.clientX-rect.left-59)/59));
  inputY=Math.max(-1,Math.min(1,(touch.clientY-rect.top-59)/59));
  stick.style.transform=`translate(${inputX*30}px,${inputY*30}px)`;
  if(otoGain){otoOsc.frequency.setTargetAtTime(30+(1-(inputY+1)/2)*80,audioCtx.currentTime,.05);otoGain.gain.setTargetAtTime(.6,audioCtx.currentTime,.05);}
}
dpad.addEventListener('touchstart',e=>{dpadActive=true;handleMove(e);},{passive:false});
window.addEventListener('touchmove',handleMove,{passive:false});
window.addEventListener('touchend',e=>{
  let on=false;
  if(e.touches)for(let t of e.touches){const r=dpad.getBoundingClientRect();if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom)on=true;}
  if(!on){dpadActive=false;inputX=0;inputY=0;if(otoGain)otoGain.gain.setTargetAtTime(0,audioCtx.currentTime,.08);stick.style.transform='translate(0,0)';}
});
const keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true;});
window.addEventListener('keyup',e=>{keys[e.key]=false;});
function handleKeyboard(){
  if(gameState!=='PLAYING')return;
  let kx=0,ky=0;
  if(keys['ArrowLeft']||keys['a'])kx--;if(keys['ArrowRight']||keys['d'])kx++;
  if(keys['ArrowUp']||keys['w'])ky--;if(keys['ArrowDown']||keys['s'])ky++;
  if(kx||ky){const l=Math.hypot(kx,ky);inputX=kx/l;inputY=ky/l;dpadActive=true;
    if(otoGain){otoOsc.frequency.setTargetAtTime(30+(1-(inputY+1)/2)*80,audioCtx.currentTime,.05);otoGain.gain.setTargetAtTime(.6,audioCtx.currentTime,.05);}
  }else if(!dpadActive){inputX=0;inputY=0;}
}

let previewAngle=270,previewRaf=null;
animatePreview._last=0;

function drawPreviewRadar(){
  const pc=document.getElementById('radar-preview');if(!pc)return;
  const px=pc.getContext('2d');
  const W=180,H=180,cx=90,cy=90,r=74;
  px.clearRect(0,0,W,H);
  [.35,.65,1].forEach(f=>{px.strokeStyle='rgba(0,255,255,.07)';px.lineWidth=1;px.beginPath();px.arc(cx,cy,r*f,0,Math.PI*2);px.stroke();});
  px.strokeStyle='rgba(0,255,255,.05)';px.lineWidth=1;
  for(let i=0;i<4;i++){const a=i*Math.PI/2;px.beginPath();px.moveTo(cx,cy);px.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);px.stroke();}
  const sRad=(previewAngle-90)*Math.PI/180;
  for(let i=0;i<16;i++){const f=i/16,a=sRad-f*1.2;px.beginPath();px.moveTo(cx,cy);px.arc(cx,cy,r*.96,a-.06,a,false);px.closePath();px.fillStyle=`rgba(0,255,255,${(1-f)*.12})`;px.fill();}
  px.save();px.shadowColor='rgba(0,255,255,.9)';px.shadowBlur=10;px.strokeStyle='rgba(0,255,255,.88)';px.lineWidth=2;px.lineCap='round';
  px.beginPath();px.moveTo(cx,cy);px.lineTo(cx+Math.cos(sRad)*(r-4),cy+Math.sin(sRad)*(r-4));px.stroke();px.restore();
  activeBeatCircles.forEach(c=>{
    const a=(c.angle-90)*Math.PI/180,x=cx+Math.cos(a)*r*c.r,y=cy+Math.sin(a)*r*c.r;
    const col=drumColor(c.id),diff=Math.min(Math.abs(previewAngle-c.angle),360-Math.abs(previewAngle-c.angle));
    const hit=diff<9;
    px.save();px.shadowColor=col;px.shadowBlur=hit?14:5;px.fillStyle=hit?'#fff':col;
    px.beginPath();px.arc(x,y,hit?5.5:3.5,0,Math.PI*2);px.fill();px.restore();
  });
  px.save();px.fillStyle='rgba(0,255,255,.6)';px.shadowColor='#0ff';px.shadowBlur=7;px.beginPath();px.arc(cx,cy,3,0,Math.PI*2);px.fill();px.restore();
}

function animatePreview(ts){
  const dt=Math.min(ts-animatePreview._last,50);animatePreview._last=ts;
  previewAngle=(previewAngle+degsPerMs()*dt)%360;
  if(currentTab==='library')drawPreviewRadar();
  else drawBuilderRadar();
  previewRaf=requestAnimationFrame(animatePreview);
}

let builderAngle=270;
let dragDrum=null;
const ghost=document.getElementById('drag-ghost');

function buildDrumChips(){
  const sb=document.getElementById('drum-chips-h');sb.innerHTML='';
  DRUMS.forEach(d=>{
    const chip=document.createElement('div');chip.className='drum-chip-h';chip.dataset.id=d.id;
    const dot=document.createElement('span');dot.className='chip-dot';dot.style.background=drumColor(d.id);
    chip.appendChild(dot);chip.appendChild(document.createTextNode(d.label));
    chip.addEventListener('pointerdown',e=>{
      e.stopPropagation();chip.setPointerCapture(e.pointerId);
      dragDrum=d.id;chip.classList.add('dragging');
      ghost.textContent=d.label;ghost.style.borderColor=drumColor(d.id);
      ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px';ghost.style.opacity='1';
    });
    chip.addEventListener('pointermove',e=>{if(!dragDrum)return;ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px';});
    chip.addEventListener('pointerup',e=>{
      if(!dragDrum)return;
      const wrap=document.getElementById('builder-radar-wrap');
      const r=wrap.getBoundingClientRect();
      const cx=r.left+100,cy=r.top+100;
      const dx=e.clientX-cx,dy=e.clientY-cy;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<=90&&dist>18){
        const angle=((Math.atan2(dy,dx)*180/Math.PI)+360)%360;
        const rad=Math.min(.92,Math.max(.25,dist/90));
        builderCircles.push({id:dragDrum,angle,r:rad});
        drawBuilderRadar();
        if(isAudioInit)playDrum(dragDrum);
      }
      dragDrum=null;chip.classList.remove('dragging');ghost.style.opacity='0';
    });
    chip.addEventListener('pointercancel',()=>{dragDrum=null;chip.classList.remove('dragging');ghost.style.opacity='0';});
    chip.addEventListener('click',()=>{if(isAudioInit)playDrum(d.id);});
    sb.appendChild(chip);
  });
}

function drawBuilderRadar(){
  const bc=document.getElementById('builder-radar-canvas');if(!bc)return;
  const bx=bc.getContext('2d');
  const W=200,H=200,cx=100,cy=100,r=88;
  bx.clearRect(0,0,W,H);
  [.3,.6,1].forEach(f=>{bx.strokeStyle='rgba(0,255,255,.07)';bx.lineWidth=1;bx.beginPath();bx.arc(cx,cy,r*f,0,Math.PI*2);bx.stroke();});
  bx.strokeStyle='rgba(0,255,255,.05)';bx.lineWidth=1;
  for(let i=0;i<4;i++){const a=i*Math.PI/2;bx.beginPath();bx.moveTo(cx,cy);bx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);bx.stroke();}
  // Beat labels at 12,3,6,9
  bx.font='bold 8px Orbitron,monospace';bx.textAlign='center';bx.textBaseline='middle';bx.fillStyle='rgba(0,255,255,.3)';
  [[270,'1'],[0,'2'],[90,'3'],[180,'4']].forEach(([ang,lbl])=>{
    const a=(ang-90)*Math.PI/180,lx=cx+Math.cos(a)*(r+12),ly=cy+Math.sin(a)*(r+12);
    bx.fillText(lbl,lx,ly);
  });
  // Sweep arm
  const sRad=(previewAngle-90)*Math.PI/180;
  for(let i=0;i<14;i++){const f=i/14,a=sRad-f*1.2;bx.beginPath();bx.moveTo(cx,cy);bx.arc(cx,cy,r*.97,a-.07,a,false);bx.closePath();bx.fillStyle=`rgba(0,255,255,${(1-f)*.14})`;bx.fill();}
  bx.save();bx.shadowColor='rgba(0,255,255,.9)';bx.shadowBlur=10;bx.strokeStyle='rgba(0,255,255,.85)';bx.lineWidth=2;bx.lineCap='round';
  bx.beginPath();bx.moveTo(cx,cy);bx.lineTo(cx+Math.cos(sRad)*(r-4),cy+Math.sin(sRad)*(r-4));bx.stroke();bx.restore();
  // Circles
  builderCircles.forEach((c,idx)=>{
    const a=(c.angle-90)*Math.PI/180,x=cx+Math.cos(a)*r*c.r,y=cy+Math.sin(a)*r*c.r;
    const col=drumColor(c.id);
    const diff=Math.min(Math.abs(previewAngle-c.angle),360-Math.abs(previewAngle-c.angle));
    const hit=diff<10;
    bx.save();bx.shadowColor=col;bx.shadowBlur=hit?16:6;bx.fillStyle=hit?'#fff':col;
    bx.beginPath();bx.arc(x,y,hit?7:5,0,Math.PI*2);bx.fill();
    // Label
    bx.font='bold 6px monospace';bx.textAlign='center';bx.textBaseline='middle';bx.fillStyle=hit?'#000':'#000';
    bx.fillText(c.id.slice(0,1).toUpperCase(),x,y);
    bx.restore();
    // Delete × on hover (handled via tap on canvas)
  });
  // Center dot
  bx.save();bx.fillStyle='rgba(0,255,255,.6)';bx.shadowColor='#0ff';bx.shadowBlur=7;bx.beginPath();bx.arc(cx,cy,3,0,Math.PI*2);bx.fill();bx.restore();
}

// Tap on builder radar to remove a circle
document.getElementById('builder-radar-canvas').addEventListener('click',e=>{
  const bc=document.getElementById('builder-radar-canvas');
  const rect=bc.getBoundingClientRect();
  const cx=rect.left+100,cy=rect.top+100,r=88;
  const dx=e.clientX-cx,dy=e.clientY-cy;
  // Find closest circle
  let closest=-1,minDist=20;
  builderCircles.forEach((c,i)=>{
    const a=(c.angle-90)*Math.PI/180,x=cx+Math.cos(a)*r*c.r,y=cy+Math.sin(a)*r*c.r;
    const d=Math.hypot(e.clientX-x,e.clientY-y);
    if(d<minDist){minDist=d;closest=i;}
  });
  if(closest>=0)builderCircles.splice(closest,1);
  drawBuilderRadar();
});

// ════════════════════════════════════════════
//  RADAR TICK (in-game)
// ════════════════════════════════════════════
function tickRadar(dt){
  if(!radarRunning)return;
  const prev=radarAngle;
  radarAngle=(radarAngle+degsPerMs()*dt)%360;
  const cur=radarAngle;

  // Beat circles
  activeBeatCircles.forEach(c=>{
    const target=((c.angle%360)+360)%360;
    let crossed=prev<=cur?target>=prev&&target<cur:target>=prev||target<cur;
    const tol=Math.max(2,degsPerMs()*dt+.5);
    const diff=Math.min(Math.abs(cur-target),360-Math.abs(cur-target));
    const inProx=diff<tol;
    const key=c.id+'_'+c.angle;
    if((crossed||inProx)&&!radarTriggered[key]){radarTriggered[key]=true;playDrum(c.id);}
    else if(!crossed&&!inProx)radarTriggered[key]=false;
  });

  // Alien radar slots — sweep hits their angle → play their drum
  aliens.forEach(al=>{
    const target=((al.radarAngleDeg%360)+360)%360;
    let crossed=prev<=cur?target>=prev&&target<cur:target>=prev||target<cur;
    const tol=Math.max(2,degsPerMs()*dt+.5);
    const diff=Math.min(Math.abs(cur-target),360-Math.abs(cur-target));
    const inProx=diff<tol;
    const key='alien_'+al.id;
    if((crossed||inProx)&&!radarTriggered[key]){radarTriggered[key]=true;playDrum(al.drumId);}
    else if(!crossed&&!inProx)radarTriggered[key]=false;
  });
}

// ════════════════════════════════════════════
//  MINI RADAR DRAW (in-game top right)
// ════════════════════════════════════════════
function drawMiniRadar(){
  const mc=document.getElementById('mini-radar-canvas');if(!mc)return;
  const mx=mc.getContext('2d');
  const W=108,H=108,cx=54,cy=54,r=46;
  mx.clearRect(0,0,W,H);
  mx.strokeStyle='rgba(0,255,255,.1)';mx.lineWidth=1;
  mx.beginPath();mx.arc(cx,cy,r,0,Math.PI*2);mx.stroke();
  mx.beginPath();mx.arc(cx,cy,r*.55,0,Math.PI*2);mx.stroke();

  // Sweep trail + arm
  const sRad=(radarAngle-90)*Math.PI/180;
  for(let i=0;i<10;i++){const f=i/10,a=sRad-f*1.1;mx.beginPath();mx.moveTo(cx,cy);mx.arc(cx,cy,r*.95,a-.08,a,false);mx.closePath();mx.fillStyle=`rgba(0,255,255,${(1-f)*.14})`;mx.fill();}
  mx.strokeStyle='rgba(0,255,255,.85)';mx.lineWidth=1.5;mx.shadowColor='#0ff';mx.shadowBlur=6;
  mx.beginPath();mx.moveTo(cx,cy);mx.lineTo(cx+Math.cos(sRad)*(r-3),cy+Math.sin(sRad)*(r-3));mx.stroke();

  // Beat circles
  activeBeatCircles.forEach(c=>{
    const a=(c.angle-90)*Math.PI/180,x=cx+Math.cos(a)*r*c.r,y=cy+Math.sin(a)*r*c.r;
    const col=drumColor(c.id),diff=Math.min(Math.abs(radarAngle-c.angle),360-Math.abs(radarAngle-c.angle));
    const hit=diff<6;
    mx.fillStyle=hit?'#fff':col;mx.shadowColor=col;mx.shadowBlur=hit?10:3;
    mx.beginPath();mx.arc(x,y,hit?4:2.5,0,Math.PI*2);mx.fill();
  });

  // Alien blips — show position mapped to radar polar coords
  // Map world pos → angle/radius relative to ship, clamped to radar edge
  aliens.forEach(al=>{
    // Use their fixed radar slot angle + pulse when arm passes
    const a=(al.radarAngleDeg-90)*Math.PI/180;
    const x=cx+Math.cos(a)*r*al.radarRadius;
    const y=cy+Math.sin(a)*r*al.radarRadius;
    const diff=Math.min(Math.abs(radarAngle-al.radarAngleDeg),360-Math.abs(radarAngle-al.radarAngleDeg));
    const hit=diff<7;
    // Pulse brightness
    const pulse=hit?1:0.55+0.35*Math.sin(Date.now()*0.006+al.id);
    mx.save();
    mx.globalAlpha=pulse;
    mx.shadowColor=al.color;mx.shadowBlur=hit?14:5;
    mx.fillStyle=hit?'#fff':al.color;
    // Diamond shape for aliens
    mx.beginPath();
    const s=hit?5:3.5;
    mx.moveTo(x,y-s);mx.lineTo(x+s,y);mx.lineTo(x,y+s);mx.lineTo(x-s,y);mx.closePath();
    mx.fill();
    // Label drum id
    mx.font=`bold ${hit?6:5}px monospace`;mx.textAlign='center';mx.textBaseline='middle';
    mx.fillStyle=hit?'#000':al.color;mx.globalAlpha=hit?1:0.5;
    mx.fillText(al.drumId.slice(0,1).toUpperCase(),x,y);
    mx.restore();
  });

  // Boss blip if active
  if(boss){
    const bAngle=((Math.atan2(boss.y-ship.y,boss.x-ship.x)*180/Math.PI)+90+360)%360;
    const bDist=Math.min(.92,Math.hypot(boss.x-ship.x,boss.y-ship.y)/(Math.max(canvas.width,canvas.height)*.6));
    const ba=(bAngle-90)*Math.PI/180;
    const bx=cx+Math.cos(ba)*r*bDist,by=cy+Math.sin(ba)*r*bDist;
    const bpulse=0.7+0.3*Math.sin(Date.now()*0.01);
    mx.save();mx.globalAlpha=bpulse;mx.shadowColor='#f0f';mx.shadowBlur=12;mx.fillStyle='#f0f';
    mx.beginPath();mx.arc(bx,by,5,0,Math.PI*2);mx.fill();mx.restore();
  }

  mx.shadowBlur=0;
}

// ════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════
let lastTs=0;
function update(ts){
  const dt=Math.min(ts-lastTs,50);lastTs=ts;
  ctx.fillStyle='rgba(5,5,16,.48)';ctx.fillRect(0,0,canvas.width,canvas.height);
  if(gameState==='START'||gameState==='PAUSED'){
    drawStars();
  } else if(gameState==='PLAYING'){
    handleKeyboard();tickRadar(dt);updateGame();
  }
  requestAnimationFrame(update);
}

// ════════════════════════════════════════════
//  GAME UPDATE
// ════════════════════════════════════════════
function updateGame(){
  drawStars();
  if(invincibleTimer>0)invincibleTimer--;
  if(powerupTimer>0){
    powerupTimer--;
    if(powerupTimer===0){powerup=null;updateHUD();}
    // Warning tick in last 3 seconds (180 frames)
    else if(powerupTimer<=180&&powerupTimer%20===0)playPowerupWarn();
  }
  if(fireCdA>0)fireCdA--;if(fireCdB>0)fireCdB--;if(fireCdC>0)fireCdC--;
  if(cowbellShieldTimer>0)cowbellShieldTimer--;

  // Health regen
  if(healthRegenCooldown>0){healthRegenCooldown--;}
  else if(health<1){health=Math.min(1,health+HEALTH_REGEN_RATE);updateHealthBar();}

  // Companion ship — docked alongside player like Galaga double ship
  if(companion){
    companion.timer--;
    if(companion.shieldTimer>0)companion.shieldTimer--;
    if(companion.timer<=0){companion=null;document.getElementById('companion-shield').style.display='none';}
    else{
      // Lock position to right of ship, matching ship's exact position
      const cx=ship.x+companion.offsetX;
      const cy=ship.y;
      companion.x=cx;companion.y=cy;
      const hasShield=companion.shieldTimer>0;
      const compFlash=invincibleTimer>0&&Math.floor(invincibleTimer/4)%2===0;
      // Draw identical ship shape at companion position, same flash as player
      if(!compFlash){
        ctx.save();ctx.translate(cx,cy);
        const sc=hasShield?'#f55':'#f99';
        ctx.strokeStyle=sc;ctx.fillStyle='rgba(255,80,80,.1)';ctx.lineWidth=2;
        ctx.shadowBlur=hasShield?18:10;ctx.shadowColor=sc;
        // Exact same shape as player ship
        ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(15,10);ctx.lineTo(0,5);ctx.lineTo(-15,10);ctx.closePath();
        ctx.fill();ctx.stroke();
        // Engine glow when thrusting (mirrors player)
        if(dpadActive){ctx.fillStyle=`rgba(255,140,100,${.4+.4*Math.random()})`;ctx.beginPath();ctx.ellipse(0,10,5,3+Math.random()*5,0,0,Math.PI*2);ctx.fill();}
        // Red shield ring
        if(hasShield){
          const pulse=.5+.5*Math.sin(Date.now()*.018);
          ctx.strokeStyle=`rgba(255,60,60,${.55+.35*pulse})`;ctx.lineWidth=2;
          ctx.beginPath();ctx.arc(0,0,28,0,Math.PI*2);ctx.stroke();
        }
        ctx.restore();ctx.shadowBlur=0;
      }
      // Move the shield div to track companion (CSS ring effect)
      const shDiv=document.getElementById('companion-shield');
      if(hasShield){
        shDiv.style.display='block';
        shDiv.style.left=(cx-30)+'px';shDiv.style.top=(cy-30)+'px';
        shDiv.style.transform='none';
      } else {shDiv.style.display='none';}
    }
  } else {document.getElementById('companion-shield').style.display='none';}

  // Guitar: only recharges when fully empty, fills all 10 over 60 seconds
  if(guitarShots===0){
    guitarRechargeMs+=16.67;
    const frac=Math.min(1,guitarRechargeMs/60000);
    // Update visual continuously while charging
    const fill=document.getElementById('guitar-bar-fill');
    if(fill){
      fill.style.height=(frac*100)+'%';
      const r=Math.floor(180+75*frac),g2=Math.floor(frac*200);
      fill.style.background=`linear-gradient(to top,rgb(${r},${Math.floor(g2*.4)},0),rgb(${r},${g2},0),${frac>.7?'#fff':'#f80'})`;
    }
    if(guitarRechargeMs>=60000){
      guitarRechargeMs=0;guitarShots=GUITAR_MAX_SHOTS;
      playGuitarPickup();updateGuitarStrip();
    }
  }

  if(dpadActive){ship.vx=inputX*ship.speed;ship.vy=inputY*ship.speed;}
  else{ship.vx*=.88;ship.vy*=.88;}
  // Scratch gravity pulls ship in drag direction
  if(scratchStrength>0){
    ship.vx+=scratchGravity.x;
    ship.vy+=scratchGravity.y;
    // Clamp so it doesn't go crazy
    const maxSpd=ship.speed*2.2;
    const spd=Math.hypot(ship.vx,ship.vy);
    if(spd>maxSpd){ship.vx=ship.vx/spd*maxSpd;ship.vy=ship.vy/spd*maxSpd;}
  }
  ship.x=(ship.x+ship.vx+canvas.width)%canvas.width;
  ship.y=(ship.y+ship.vy+canvas.height)%canvas.height;
  updateStars(ship.vx,ship.vy);
  // Engine hum
  const speedFrac=Math.hypot(ship.vx,ship.vy)/ship.speed;
  updateEngine(dpadActive,speedFrac);

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.95;p.vy*=.95;p.life-=p.decay;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
  }ctx.globalAlpha=1;

  // powerups
  for(let i=powerupItems.length-1;i>=0;i--){
    const p=powerupItems[i];p.y+=p.vy;p.age++;
    if(p.age>320){powerupItems.splice(i,1);continue;}
    const pulse=.6+.4*Math.sin(p.age*.14);
    ctx.shadowBlur=10*pulse;ctx.shadowColor=p.color;ctx.fillStyle=p.color;ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(p.x,p.y,10,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    ctx.fillStyle='#000';ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText({spread:'✦',rapid:'⚡',shield:'🛡'}[p.type]||'?',p.x,p.y);
    if(Math.hypot(p.x-ship.x,p.y-ship.y)<22){
      powerup=p.type;powerupTimer=POWERUP_DURATION;
      if(p.type==='spread')playSpreadPickup();
      else if(p.type==='rapid')playRapidPickup();
      else if(p.type==='shield')playShieldPickup();
      else if(p.type==='guitar')playGuitarPickup();
      else playPowerupSound();
      powerupItems.splice(i,1);updateHUD();
    }
  }

  // ship
  const flash=invincibleTimer>0&&Math.floor(invincibleTimer/4)%2===0;
  if(!flash){
    ctx.save();ctx.translate(ship.x,ship.y);
    const sc=powerup==='shield'?'#0f0':'#0ff';
    ctx.strokeStyle=sc;ctx.fillStyle='rgba(0,255,255,.07)';ctx.lineWidth=2;ctx.shadowBlur=13;ctx.shadowColor=sc;
    ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(15,10);ctx.lineTo(0,5);ctx.lineTo(-15,10);ctx.closePath();ctx.fill();ctx.stroke();
    if(dpadActive){ctx.fillStyle=`rgba(0,200,255,${.4+.4*Math.random()})`;ctx.beginPath();ctx.ellipse(0,10,5,3+Math.random()*5,0,0,Math.PI*2);ctx.fill();}
    if(powerup==='shield'){ctx.strokeStyle='rgba(0,255,0,.36)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,28,0,Math.PI*2);ctx.stroke();}
    // Cowbell shield — teal pulsing ring
    if(cowbellShieldTimer>0){
      const pulse=.5+.5*Math.sin(Date.now()*.025);
      ctx.strokeStyle=`rgba(0,255,180,${.5+.4*pulse})`;ctx.lineWidth=2.5;
      ctx.shadowBlur=14*pulse;ctx.shadowColor='#0fb';
      ctx.beginPath();ctx.arc(0,0,34,0,Math.PI*2);ctx.stroke();
    }
    ctx.restore();
  }

  // bullets
  for(let b=bullets.length-1;b>=0;b--){
    const bl=bullets[b];bl.x+=bl.vx;bl.y+=bl.vy;
    if(bl.x<-10||bl.x>canvas.width+10||bl.y<-10||bl.y>canvas.height+10){bullets.splice(b,1);continue;}
    ctx.fillStyle=bl.color;ctx.shadowBlur=10;ctx.shadowColor=bl.color;ctx.beginPath();ctx.arc(bl.x,bl.y,bl.size,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    let hit=false;
    for(let a=asteroids.length-1;a>=0;a--){
      const ast=asteroids[a];
      if(Math.hypot(bl.x-ast.x,bl.y-ast.y)<ast.size/2){
        playAsteroidHit(ast.size);playBulletTick();
        spawnParticles(ast.x,ast.y,ast.color,Math.floor(ast.size/4));spawnPowerup(ast.x,ast.y);
        score+=Math.floor(ast.size);
        if(ast.size>35){for(let s=0;s<2;s++){const ang=Math.random()*Math.PI*2,spd=.15+Math.random()*.18;asteroids.push(makeAsteroid(ast.x+(Math.random()-.5)*20,ast.y+(Math.random()-.5)*20,ast.size*.55,Math.cos(ang)*spd,Math.sin(ang)*spd));}}
        asteroids.splice(a,1);hit=true;updateHUD();break;
      }
    }
    if(hit)bullets.splice(b,1);
  }

  // asteroids
  for(let a=asteroids.length-1;a>=0;a--){
    const ast=asteroids[a];
    ast.x+=ast.vx;ast.y+=ast.vy;ast.rot+=ast.rotSpeed;
    // Scratch repulsion: push asteroids radially away from ship
    if(scratchStrength>0.05){
      const dx=ast.x-ship.x,dy=ast.y-ship.y;
      const dist=Math.hypot(dx,dy)||1;
      const pushRadius=280;
      if(dist<pushRadius){
        const force=scratchStrength*1.8*(1-dist/pushRadius);
        ast.vx+=dx/dist*force;ast.vy+=dy/dist*force;
        const spd=Math.hypot(ast.vx,ast.vy);
        if(spd>2.5){ast.vx=ast.vx/spd*2.5;ast.vy=ast.vy/spd*2.5;}
      }
    }
    // Cowbell shield gravity: pull asteroids toward ship
    if(cowbellShieldGravity&&cowbellShieldTimer>0){
      const dx=ship.x-ast.x,dy=ship.y-ast.y;
      const dist=Math.hypot(dx,dy)||1;
      // Gentle pull - much weaker than before
      ast.vx+=dx/dist*0.04;ast.vy+=dy/dist*0.04;
      // Cap so they don't go too fast
      const spd2=Math.hypot(ast.vx,ast.vy);
      if(spd2>1.2){ast.vx=ast.vx/spd2*1.2;ast.vy=ast.vy/spd2*1.2;}
    }
    if(ast.x<-ast.size*2||ast.x>canvas.width+ast.size*2||ast.y<-ast.size*2||ast.y>canvas.height+ast.size*2){
      // Always spawn fresh from edge with normal speed — never carry scratch velocity through
      asteroids.splice(a,1);asteroids.push(spawnEdgeAsteroid());continue;
    }
    ctx.save();ctx.translate(ast.x,ast.y);ctx.rotate(ast.rot);
    ctx.strokeStyle=ast.color;ctx.lineWidth=2;ctx.shadowBlur=3;ctx.shadowColor=ast.color;
    ctx.beginPath();ast.shape.forEach((v,i)=>i===0?ctx.moveTo(v.x,v.y):ctx.lineTo(v.x,v.y));
    ctx.closePath();ctx.stroke();ctx.restore();ctx.shadowBlur=0;
    if(invincibleTimer===0&&powerup!=='shield'&&cowbellShieldTimer===0&&Math.hypot(ast.x-ship.x,ast.y-ship.y)<ast.size/2+14)takeDamage();

    // Asteroids hit aliens
    for(let ai=aliens.length-1;ai>=0;ai--){
      const al=aliens[ai];
      if(Math.hypot(ast.x-al.x,ast.y-al.y)<ast.size/2+al.size*.6){
        al.hp--;al.hit=8;
        // Bounce asteroid off alien
        const nx=(ast.x-al.x),ny=(ast.y-al.y),nd=Math.hypot(nx,ny)||1;
        ast.vx+=nx/nd*0.4;ast.vy+=ny/nd*0.4;
        if(al.hp<=0){
          playAlienExplosion(al.x,al.y);spawnParticles(al.x,al.y,al.color,10);
          spawnPowerup(al.x,al.y);score+=50+wave*5;updateHUD();onAlienKilled();
          aliens.splice(ai,1);
        }
        break;
      }
    }
  }
  if(asteroids.length===0&&gameState==='PLAYING'){wave++;updateHUD();spawnAsteroids();playWaveClear();}

  // Aliens
  updateAliens();
  // Boss
  if(boss)updateBoss();

  drawMiniRadar();
}

function updateHealthBar(){
  const fill=document.getElementById('health-bar-fill');
  if(fill){
    fill.style.width=(health*100)+'%';
    const r=Math.floor(255*(1-health)),g2=Math.floor(200*health);
    fill.style.background=`linear-gradient(to right,rgb(${r},${g2},200),rgb(0,${g2},255))`;
  }
}

function spawnCompanion(){
  companion={
    timer:COMPANION_DURATION,
    shieldTimer:COMPANION_SHIELD_DURATION,
    side:1,        // +1 = right side offset from player
    offsetX:32,    // horizontal distance from ship center
  };
  // Play power-up docking fanfare
  if(audioCtx){
    const t=audioCtx.currentTime;
    [261.6,329.6,392,523.3].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(.4,t+i*.1);g.gain.exponentialRampToValueAtTime(.001,t+i*.1+.2);
      o.connect(g);g.connect(masterGain);o.start(t+i*.1);o.stop(t+i*.1+.25);o.onended=()=>g.disconnect();
    });
  }
}

function takeDamage(){
  if(invincibleTimer>0)return;
  health-=0.25;healthRegenCooldown=HEALTH_HIT_COOLDOWN;
  if(health<=0){
    health=0;lives--;invincibleTimer=120;playDamageSound();spawnParticles(ship.x,ship.y,'#f00',10);
    const fl=document.getElementById('damage-flash');fl.style.background='rgba(255,0,0,0.35)';
    setTimeout(()=>fl.style.background='rgba(255,0,0,0)',120);updateHUD();
    if(lives<=0){gameState='GAMEOVER';radarRunning=false;
      document.getElementById('final-score').textContent=`SCORE: ${score} | WAVE: ${wave}`;
      document.getElementById('gameover-ui').style.display='flex';}
  } else {
    invincibleTimer=80;playDamageSound();spawnParticles(ship.x,ship.y,'#f00',5);
    const fl=document.getElementById('damage-flash');fl.style.background='rgba(255,0,0,0.2)';
    setTimeout(()=>fl.style.background='rgba(255,0,0,0)',80);
  }
  updateHealthBar();
}

// ════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════
buildBeatGrid();
buildDrumChips();
switchTab('library');
animatePreview._last=performance.now();
previewRaf=requestAnimationFrame(animatePreview);
requestAnimationFrame(update);
</script>
